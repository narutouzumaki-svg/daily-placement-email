name: Morning Questions Email

on:
  schedule:
    # 8:00 AM IST
    - cron: "30 2 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-morning-email:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"


      - name: Install dependencies
        run: |
          pip install -r requirements.txt


      - name: Run morning script
        env:
          EMAIL: ${{ secrets.EMAIL }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
        run: |
          python morning.py


      - name: Save updated question state
        run: |

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add used_questions.json today_questions.json

          git commit -m "Update question state" || echo "No changes"

          git push